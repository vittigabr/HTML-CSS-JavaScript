<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portifolio</title>
</head>
<body>
    <section class="sectionUsuario">
        <img class="imgUsuario" src="https://i.pravatar.cc/150?img=48" alt="">
        <h1>Judite Sauro</h1>
        <h3>Designer de Produto Digital</h3>
        <p>Chefe do Estúdio de Design</p>
    </section>
    <section class="cards">
        <div class="card grafico">
            <img src="../assets/Design Gráfico.png" alt="">
            <p>Design Gráfico</p>
            <button class="botaoMais">Mais</button>
        </div>

        <div class="card web">
            <img src="../assets/Designer de Web.png" alt="">
            <p>Designer de Web</p>
            <button class="botaoMais">Mais</button>
        </div>

        <div class="card prog">
            <img src="../assets/Programas.png" alt="">
            <p>Programas</p>
            <button class="botaoMais">Mais</button>
        </div>

        <div class="card app">
            <img src="../assets/Aplicativo.png" alt="">
            <p>Aplicativo</p>
            <button class="botaoMais">Mais</button>
        </div>
    </section>
    <section class="rodape">
        <h1 class="textRodape">Fico feliz em saber que mais de 300 projetos foram realizados com sucesso!</h1>
        <button class="botaoRodape">Envie uma mensagem</button>
    </section>
</body>
</html>
