<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- https://i.pravatar.cc/150?img=48 -->
    <main class="containerPrincipal">
        <img class="imagemPerfil" src="https://i.pravatar.cc/150?img=48" alt="Imagem">
        <h1>Judite Sauro</h1>
        <h3>Designer de Produto Digital</h3>
        <p>Chefe do Estúdio de Design</p>

        <section class="caixinhas">
            <div class="card design">
                <img class="imagemCard" src="../assets/Design Gráfico.png" alt="Design Gráfico">
                <p>Design Gráfico</p>
                <button class="botaoMais" >Mais</button>
            </div>

            <div class="card designWeb">
                <img class="imagemCard" src="../assets/Designer de Web.png" alt="Design de Web">
                <p>Design de Web</p>
                <button class="botaoMais" >Mais</button>
            </div>

            <div class="card programas">
                <img class="imagemCard" src="../assets/Programas.png" alt="Programas">
                <p>Programas</p>
                <button class="botaoMais" >Mais</button>
            </div>

            <div class="card aplicativo">
                <img class="imagemCard" src="../assets/Aplicativo.png" alt="Aplicativo">
                <p>Aplicativo</p>
                <button class="botaoMais" >Mais</button>
            </div>
        </section>
    </main>

    <footer>
        <h1>Fico feliz em saber que mais de 300 projetos foram realizados com sucesso!</h1>

        <button class="botaoMensagem">ENVIE UMA MENSAGEM</button>
    </footer>
</body>
</html>
