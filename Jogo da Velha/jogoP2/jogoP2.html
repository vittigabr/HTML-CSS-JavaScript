<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../jogos.css">
    <title>TicTacToe</title>
</head>
<body>
    <main class="tabuleiro">
        <section class="score">
            <div class="placar placarX">
                <p>X - </p>
                <p id="placarX"></p>
            </div>
            <div class="placar placarO">
                <p>O - </p>
                <p id="placarO"></p>
            </div>
        </section>
        <div id="resultado">Resultado: </div>
        <section class="jogo">
            <!-- primeira linha -->
            <div class="casa"></div> <!--0-->
            <div class="casa"></div> <!--1-->
            <div class="casa"></div> <!--2-->
            
            <!-- segunda linha -->
            <div class="casa"></div> <!--3-->
            <div class="casa"></div> <!--4-->
            <div class="casa"></div> <!--5-->
            
            <!-- terceira linha -->
            <div class="casa"></div> <!--6-->
            <div class="casa"></div> <!--7-->
            <div class="casa"></div> <!--8-->
        </section>
    </main>
    <script src="jogoP2.js"></script>
</body>
</html>
