<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>AluraPlus</title>
</head>
<body>
    <main>
        <section class="container containerPrincipal">
            
            <div class="containerCombo">
                <h1 class="containerTitulo">Com o Combo+, você pode aproveitar a Alura+ e o Alura Língua por um preço único.</h1>

                <img class="containerImg" src="assets/Combo.png" alt="#">

                <div class="containerBotao">
                    <a class="botaoAzul" href="#">Assine por 12x de R$ 120,00*</a>
                    <a class="botaoTransp" href="#">Assinar somente o Alura+</a>
                </div>
            </div>
        </section>
        <div class="containerPlataformas">
            <img class="imgPlataformas" src="assets/Plataformas.png" alt="">

            <div class="containerPlataformasText">
                <h2 class="tituloPlataformas">Assista do seu jeito</h2>
                <p class="textPlataformas">Aproveite a tela grande da TV ou assista no tablet, laptop, celular e outros aparelhos. Nossa seleção de cursos não para de crescer.</p>
            </div>
        </div>
    
    </main>
</body>
</html>
