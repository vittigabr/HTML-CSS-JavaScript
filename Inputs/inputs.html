<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exemplo Inputs</title>
</head>
<body>
    <h1>Exemplo de Inputs</h1>
    <form action="">
        <label>Texto:</label>
        <input type="text" placeholder="Digite seu nome completo">
        
        <label>Senha:</label>
        <input type="password" placeholder="Sua Senha">

        <label>Email:</label>
        <input type="email" placeholder="E-mail@email.com">

        <label for="">Número:</label>
        <input type="number" placeholder="Números" min="1" max="500">

        <label for="">Telefone:</label>
        <input type="tel" placeholder="(99) 99999-9999">

        <label for="">URL:</label>
        <input type="url" placeholder="https://example.com">

        <label for="">Data:</label>
        <input type="date" placeholder="dd/mm/aaaa">

        <label for="">Data e Hora:</label>
        <input type="datetime-local" placeholder="dd/mm/aaaa hh:mm:ss">

        <label for="">Hora:</label>
        <input type="time" name="" id="">

        <label for="">Mês</label>
        <input type="month" name="" id="">

        <label for="">Cor:</label>
        <input type="color">

        <label for="">Checkbox:</label>
        <p><input type="checkbox">Aceito os termos de uso</p>

        <label for="">Radio:</label>
        <p><input type="radio"> Masculino <input type="radio" name="" id=""> Feminino</p>

        <label for="">Escolha arquivo:</label>
        <input type="file" name="" id="">

        <label for="">Mensagem</label>
        <textarea name="" id="" placeholder="Digite sua mensagem aqui..."></textarea>

        <label for="">Escolha uma opção</label>
        <select name="" id="">
            <option value="">Selecione</option>
            <option value="">Pira</option>
            <option value="">Sampa</option>
            <option value="">Floripa</option>
            <option value="">RJ</option>
        </select>

        <div class="botoes">
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
