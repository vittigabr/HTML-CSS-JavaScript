<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <section class="section login-section">
        <div class="div-container">
            <h2>Bem-vindo!</h2>
            <form action="" class="form-container">
                <label for="">Login</label>
                <input type="text" name="" id="" placeholder=" Digite seu login">

                <label for="">Senha</label>
                <input type="password" name="" id="" placeholder=" Digite sua senha">

                <input type="submit" value="Entrar" class="botao">
            </form>
            <p>Não tem conta? <a href="#cadastro" class="clique">Clique aqui</a></p>
        </div>
    </section>
    <section class="section cadastro-section" id="cadastro">
        <div class="div-container">
            <h2>Bem-vindo!</h2>
            <h2 class="subtitulo">Crie sua conta</h2>
            <form action="" class="form-container">
                <label for="">Email</label>
                <input type="email" name="" id="" placeholder=" exemplo@gmail.com">

                <label for="">Telefone</label>
                <input type="tel" name="" id="" placeholder=" +55 DDD + número">

                <label for="">Nome</label>
                <input type="text" name="" id="" placeholder=" Seu nome completo">

                <label for="">Senha</label>
                <input type="password" name="" id="" placeholder=" Digite sua senha">

                <p class="termos"><input type="checkbox" name="" id=""> Aceito que entrem em contato comigo por SMS e WhatsApp</p>

                <p class="condicoes">Ao "Continuar", aceito os <span>Termos e Condições</span> e autorizo o uso dos meus dados de acordo com a <span>Declaração de privacidade</span></p>

                <input type="submit" value="Cadastrar" class="botao">
            </form>
        </div>
    </section>
</body>
</html>
