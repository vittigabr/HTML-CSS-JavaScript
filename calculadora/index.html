<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Calculadora</title>
</head>
<body class="light-theme">
    <button id="mudarCor" class="btn">Mudar Cor</button>
    <section class="background">
        <section class="numeros">
            <div class="visor">
                <h1>visor</h1>
            </div>
            <div class="botao-numeros">
                <div class="sete-nove">
                    <button><p><img src="assets/Clear Symbol.png" alt=""></p></button>
                    <button><p>CE</p></button>
                    <button><p>%</p></button>
                    <button><p><img src="assets/Divide.png" alt=""></p></button>
                </div>
                <div class="sete-nove">
                    <button><p>7</p></button>
                    <button><p>8</p></button>
                    <button><p>9</p></button>
                    <button><p><img src="assets/Multiply.png" alt=""></p></button>
                </div>
                <div class="quatro-seis">
                    <button><p>4</p></button>
                    <button><p>5</p></button>
                    <button><p>6</p></button>
                    <button><p><img src="assets/Subtract.png" alt=""></p></button>
                </div>
                <div class="um-tres">
                    <button><p>1</p></button>
                    <button><p>2</p></button>
                    <button><p>3</p></button>
                    <button><p><img src="assets/Plus Math.png" alt=""></p></button>
                </div>
                <div class="zero-sinal">
                    <button><p>+/-</p></button>
                    <button><p>0</p></button>
                    <button><p>,</p></button>
                    <button><p><img src="assets/Equal Sign.png" alt=""></p></button>
                </div>
            </div>
        </section>
    </section>
</body>
</html>
