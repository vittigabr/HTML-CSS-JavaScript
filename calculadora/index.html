<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body id="body-div" class="light-theme">
    <!-- <button id="btn" onclick="changeColor()">Mudar Cor</button> -->
    <input type="button" onclick="changeColor()" value="color" id="bnt">
    <section class="background">
        <section class="numeros">
            <div class="visor">
                <p id="resposta"></p>
            </div>
            <div class="botao-numeros">
                <div class="clear">
                    <button><img src="assets/Clear Symbol.png" alt=""></button>
                    <button>CE</button>
                    <button>%</button>
                    <button id="botaoDivisao"><img src="assets/Divide.png" alt=""></button>
                </div>
                <div class="sete-nove">
                    <button class="bnt">7</button>
                    <button class="bnt">8</button>
                    <button class="bnt">9</button>
                    <button id="botaoMulti"><img src="assets/Multiply.png" alt=""></button>
                </div>
                <div class="quatro-seis">
                    <button class="bnt">4</button>
                    <button class="bnt">5</button>
                    <button class="bnt">6</button>
                    <button id="botaoSubtracao"><img src="assets/Subtract.png" alt=""></button>
                </div>
                <div class="um-tres">
                    <button class="bnt">1</button>
                    <button class="bnt">2</button>
                    <button class="bnt">3</button>
                    <button id="botaoSoma"><img src="assets/Plus Math.png" alt=""></button>
                </div>
                <div class="zero-sinal">
                    <button>+/-</button>
                    <button class="bnt">0</button>
                    <button>,</button>
                    <button><img src="assets/Equal Sign.png" alt=""></button>
                </div>
            </div>
        </section>
    </section>
    <script src="script.js"></script>
</body>
</html>
